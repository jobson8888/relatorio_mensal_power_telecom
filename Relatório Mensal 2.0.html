<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Relatório de Ações CGR — Power Telecom</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0B0F14;
    --surface:#131923;
    --surface-2:#1B232F;
    --border:#1F2937;
    --border-soft:#26303D;
    --text:#F3F4F6;
    --text-muted:#9CA3AF;
    --text-dim:#6B7280;
    --primary:#22C55E;
    --primary-light:#86EFAC;
    --primary-dark:#16A34A;
    --warn:#F59E0B;
    --danger:#EF4444;
    --info:#60A5FA;
    --magenta:#D946EF;
    --pink:#F472B6;
    --cyan:#22D3EE;
    --shadow:0 8px 24px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{min-height:100vh;display:flex;flex-direction:column}

  /* Layout */
  .app{display:grid;grid-template-columns:300px 1fr;min-height:100vh}
  @media (max-width:1024px){.app{grid-template-columns:1fr}.sidebar{position:fixed;left:-320px;top:0;bottom:0;z-index:100;transition:left .25s ease}.sidebar.open{left:0}.menu-toggle{display:inline-flex!important}}

  /* Sidebar */
  .sidebar{background:#0a0e14;border-right:1px solid var(--border);padding:24px 0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
  .brand{padding:0 20px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);margin-bottom:12px}
  .brand-logo{width:38px;height:38px;border-radius:8px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));display:flex;align-items:center;justify-content:center;font-weight:800;color:#0a0e14;font-size:18px}
  .brand-text{font-weight:700;font-size:14px;letter-spacing:.5px}
  .brand-text small{display:block;color:var(--text-muted);font-weight:500;font-size:11px;letter-spacing:1px;margin-top:2px}
  .toc-title{font-size:11px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;padding:8px 20px 6px}
  .toc{list-style:none;padding:0;margin:0;flex:1}
  .toc li{padding:0}
  .toc button{width:100%;text-align:left;background:transparent;color:var(--text-muted);border:none;padding:10px 20px;cursor:pointer;font-family:inherit;font-size:13px;display:flex;align-items:center;gap:10px;border-left:2px solid transparent;transition:all .15s}
  .toc button:hover{background:var(--surface);color:var(--text)}
  .toc button.active{background:var(--surface);color:var(--primary-light);border-left-color:var(--primary)}
  .toc-num{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:11px;color:var(--text-dim);width:22px;flex-shrink:0}
  .toc button.active .toc-num{color:var(--primary)}
  .toc-label{flex:1;line-height:1.3}

  /* Main */
  main{display:flex;flex-direction:column;min-width:0}
  .toolbar{position:sticky;top:0;background:rgba(11,15,20,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:10px;z-index:50;flex-wrap:wrap}
  .menu-toggle{display:none;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;cursor:pointer;align-items:center}
  .toolbar-spacer{flex:1}
  .btn{background:var(--surface);color:var(--text);border:1px solid var(--border);padding:8px 14px;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:500;font-size:13px;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
  .btn:hover{border-color:var(--border-soft);background:var(--surface-2)}
  .btn.primary{background:var(--primary);color:#0a0e14;border-color:var(--primary);font-weight:700}
  .btn.primary:hover{background:var(--primary-dark);border-color:var(--primary-dark)}
  .btn.danger:hover{border-color:var(--danger);color:var(--danger)}
  .btn.active{background:var(--primary);color:#0a0e14;border-color:var(--primary);font-weight:700}

  /* Slide stage */
  .stage{padding:32px;flex:1;display:flex;flex-direction:column;gap:16px}
  .slide{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px;min-height:560px;aspect-ratio:16/9;display:flex;flex-direction:column;position:relative;overflow:hidden;box-shadow:var(--shadow)}
  @media (max-width:900px){.slide{aspect-ratio:auto;padding:32px 20px;min-height:auto}}
  .slide.cover, .slide.section{background:linear-gradient(135deg,#0a0e14 0%,#0F1822 60%,#0d2415 100%);position:relative}
  .slide.cover::before, .slide.section::before{content:'';position:absolute;right:-100px;top:-50px;width:600px;height:600px;background:radial-gradient(circle,rgba(34,197,94,.15) 0%,transparent 60%);pointer-events:none}
  .slide.cover::after, .slide.section::after{content:'';position:absolute;right:50px;bottom:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(34,197,94,.12) 0%,transparent 60%);pointer-events:none}

  /* Cover */
  .cover-content{position:relative;z-index:2;display:flex;flex-direction:column;justify-content:center;height:100%;max-width:60%}
  .cover-content h1{font-size:clamp(36px,5vw,72px);line-height:1.05;margin:0;font-weight:900;letter-spacing:-1px}
  .cover-content h1 .accent{color:var(--primary);display:block}
  .cover-icon{position:absolute;right:8%;top:50%;transform:translateY(-50%);z-index:2;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(34,197,94,.3),transparent 70%);display:flex;align-items:center;justify-content:center;font-size:120px}
  .cover-icon svg{width:140px;height:140px;filter:drop-shadow(0 0 24px rgba(34,197,94,.5))}

  /* Section divider */
  .section-content{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;height:100%}
  .section-brand{display:flex;flex-direction:column;gap:8px}
  .section-brand .logo-mark{font-size:48px;font-weight:900;color:var(--primary);letter-spacing:-2px;display:flex;align-items:center;gap:4px}
  .section-brand .logo-mark::before{content:'';width:38px;height:38px;border:4px solid var(--primary);border-radius:50%;border-bottom-color:transparent;transform:rotate(-30deg);display:inline-block}
  .section-brand small{color:var(--text-muted);font-style:italic;font-size:14px}
  .section-title{text-align:right}
  .section-title h2{font-size:clamp(32px,4vw,56px);font-weight:800;margin:0;line-height:1.05}
  .section-title h2 .accent{color:var(--primary);display:block}

  /* Standard slide head */
  .slide-head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:8px}
  .slide-head .title-block h2{margin:0;font-size:clamp(24px,2.6vw,38px);font-weight:800;letter-spacing:-.5px}
  .slide-head .title-block .subtitle{color:var(--text-muted);font-size:16px;margin-top:4px;font-weight:500}
  .slide-head .title-block .sub2{color:var(--text-dim);font-size:14px;margin-top:2px}
  .chip{background:rgba(34,197,94,.12);color:var(--primary-light);font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px;letter-spacing:1px;text-transform:uppercase}

  .chart-wrap{flex:1;min-height:0;position:relative;margin-top:12px}
  .chart-wrap canvas{max-height:100%}

  /* Activities grid */
  .activities-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:24px;flex:1}
  @media (max-width:900px){.activities-grid{grid-template-columns:repeat(2,1fr)}}
  .activity-card{background:#fff;color:#0a0e14;border-radius:14px;padding:18px;font-size:14px;line-height:1.4;text-align:center;display:flex;align-items:center;justify-content:center;font-weight:500;position:relative;min-height:90px;box-shadow:0 4px 12px rgba(0,0,0,.25)}
  .activity-card .del{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:50%;background:var(--danger);color:#fff;border:none;cursor:pointer;display:none;font-size:14px;line-height:1;align-items:center;justify-content:center;padding:0}
  body.edit-mode .activity-card .del{display:inline-flex}
  .activity-card[contenteditable=true]{outline:2px solid var(--primary)}
  .activity-add{background:transparent;border:2px dashed var(--border-soft);color:var(--text-muted);display:none;align-items:center;justify-content:center;border-radius:14px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;min-height:90px}
  body.edit-mode .activity-add{display:flex}
  .activity-add:hover{border-color:var(--primary);color:var(--primary)}

  /* WANGUARD pie grid */
  .pie-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-top:24px;flex:1;background:#fff;color:#111;border-radius:12px;padding:24px;overflow:auto}
  .pie-cell{display:flex;flex-direction:column;align-items:center;gap:6px}
  .pie-cell h4{font-size:13px;font-weight:600;color:#111;margin:0 0 8px}
  .pie-cell .pie-canvas-wrap{position:relative;width:100%;aspect-ratio:1;max-width:140px}

  /* Editable text */
  [data-edit]{cursor:text;border-radius:4px;transition:background .15s;padding:0 2px}
  body.edit-mode [data-edit]{outline:1px dashed rgba(34,197,94,.4)}
  body.edit-mode [data-edit]:hover{background:rgba(34,197,94,.08)}
  body.edit-mode [data-edit]:focus{outline:2px solid var(--primary);background:rgba(34,197,94,.1);outline-offset:2px}
  [contenteditable=true]:empty:before{content:'(vazio)';color:var(--text-dim)}

  /* Metrics slide */
  .metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px;margin-top:32px;flex:1;align-content:center}
  .metric-card{background:linear-gradient(180deg,rgba(34,197,94,.06),rgba(34,197,94,.02));border:1px solid var(--border);border-radius:18px;padding:32px 28px;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;gap:8px;min-height:200px;position:relative;transition:border-color .15s}
  .metric-card::before{content:'';position:absolute;top:0;left:24px;right:24px;height:3px;background:var(--metric-color,var(--primary));border-radius:0 0 4px 4px}
  .metric-card .metric-label{font-size:13px;color:var(--text-muted);font-weight:600;letter-spacing:1.5px;text-transform:uppercase}
  .metric-card .metric-value-wrap{display:flex;align-items:baseline;gap:4px;flex-wrap:wrap;font-family:'JetBrains Mono',monospace}
  .metric-card .metric-prefix,.metric-card .metric-suffix{font-size:24px;color:var(--text-muted);font-weight:600}
  .metric-card .metric-value{font-size:clamp(48px,7vw,84px);font-weight:800;color:var(--metric-color,var(--primary));line-height:1;letter-spacing:-2px}
  body.edit-mode .metric-card .metric-value{cursor:text}
  .metric-edit-row{position:absolute;top:12px;right:12px;display:none;gap:6px}
  body.edit-mode .metric-edit-row{display:flex}

  /* Vehicles slide */
  .vehicles-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:24px;margin-top:24px;flex:1;align-content:center}
  .vehicle-card{background:linear-gradient(180deg,rgba(34,197,94,.06),rgba(0,0,0,.2));border:1px solid var(--border);border-radius:18px;padding:24px 28px;display:flex;flex-direction:column;gap:20px;position:relative;min-height:280px}
  .vehicle-card::before{content:'';position:absolute;top:0;left:24px;right:24px;height:3px;background:var(--metric-color,var(--primary));border-radius:0 0 4px 4px}
  .vehicle-header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding-bottom:14px;border-bottom:1px solid var(--border)}
  .vehicle-header .icon{width:42px;height:42px;border-radius:10px;background:rgba(34,197,94,.12);display:flex;align-items:center;justify-content:center;color:var(--metric-color,var(--primary));flex-shrink:0}
  .vehicle-header .icon svg{width:24px;height:24px}
  .placa{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:24px;letter-spacing:2px;color:var(--text);background:rgba(0,0,0,.3);padding:6px 14px;border-radius:8px;border:1px solid var(--border-soft);text-align:center;flex:1}
  body.edit-mode .placa{border-color:var(--primary)}
  .vehicle-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;flex:1;align-content:center}
  .vehicle-stat{display:flex;flex-direction:column;gap:4px;align-items:flex-start}
  .vehicle-stat .stat-label-sm{font-size:11px;color:var(--text-muted);font-weight:600;letter-spacing:1px;text-transform:uppercase}
  .vehicle-stat .stat-value-sm{font-size:clamp(22px,2.4vw,32px);font-weight:800;color:var(--metric-color,var(--primary));font-family:'JetBrains Mono',monospace;line-height:1.1}
  .vehicle-stat .stat-unit-sm{font-size:13px;color:var(--text-muted);font-weight:500}

  /* Edit data button on charts */
  .edit-data-btn{position:absolute;top:0;right:0;background:var(--surface-2);border:1px solid var(--border);color:var(--text-muted);padding:6px 12px;border-radius:8px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;display:none;z-index:5;gap:6px;align-items:center}
  body.edit-mode .edit-data-btn{display:inline-flex}
  .edit-data-btn:hover{color:var(--primary);border-color:var(--primary)}

  /* Footer nav */
  .slide-nav{display:flex;align-items:center;justify-content:space-between;padding:16px 32px 32px;gap:16px}
  .page-indicator{font-family:'JetBrains Mono',monospace;color:var(--text-muted);font-size:13px}
  .page-indicator strong{color:var(--text);font-weight:700}

  /* Modal */
  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:200;padding:24px}
  .modal-backdrop.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;max-width:880px;width:100%;max-height:90vh;overflow:auto;box-shadow:0 24px 64px rgba(0,0,0,.6)}
  .modal-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:2}
  .modal-head h3{margin:0;font-size:18px;font-weight:700}
  .modal-body{padding:24px}
  .modal-foot{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:var(--surface)}
  .close-btn{background:transparent;border:none;color:var(--text-muted);font-size:22px;cursor:pointer;width:32px;height:32px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center}
  .close-btn:hover{background:var(--surface-2);color:var(--text)}

  /* Data table */
  .data-table{width:100%;border-collapse:collapse}
  .data-table th, .data-table td{border-bottom:1px solid var(--border);padding:8px;text-align:left;font-size:13px}
  .data-table th{color:var(--text-muted);font-weight:600;font-size:11px;letter-spacing:1px;text-transform:uppercase}
  .data-table input{background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-family:inherit;font-size:13px;width:100%}
  .data-table input:focus{outline:none;border-color:var(--primary)}
  .data-table input[type=color]{padding:2px;height:32px;width:50px;cursor:pointer}
  .data-table .col-actions{width:50px;text-align:center}
  .icon-btn{background:transparent;border:none;color:var(--text-muted);cursor:pointer;padding:4px 8px;border-radius:4px;font-family:inherit}
  .icon-btn:hover{background:var(--surface-2);color:var(--danger)}
  .add-row-btn{margin-top:12px;background:transparent;border:1px dashed var(--border-soft);color:var(--text-muted);padding:8px 14px;border-radius:8px;font-family:inherit;cursor:pointer;font-size:13px}
  .add-row-btn:hover{border-color:var(--primary);color:var(--primary)}

  .series-block{border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px}
  .series-block .series-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .series-block input[type=text]{background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-family:inherit;font-size:13px;min-width:160px}

  /* Toast */
  .toast{position:fixed;bottom:24px;right:24px;background:var(--surface-2);border:1px solid var(--primary);border-radius:10px;padding:12px 18px;color:var(--text);font-size:13px;box-shadow:var(--shadow);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s, transform .25s;transform:translateY(20px)}
  .toast.show{opacity:1;transform:translateY(0)}

  /* Print */
  @media print{
    body{background:#fff;color:#000}
    .sidebar,.toolbar,.slide-nav,.edit-data-btn,.activity-add,.menu-toggle{display:none!important}
    .app{display:block}
    .stage{padding:0}
    .slide{page-break-after:always;border-radius:0;aspect-ratio:16/9;min-height:0;height:100vh;border:none;box-shadow:none;margin:0;break-inside:avoid}
    .slides-all .slide{display:flex!important}
  }

  /* Print mode (in-app, shows all slides) */
  body.print-view .toolbar{position:static}
  body.print-view .stage{display:block;padding:24px}
  body.print-view .slide{margin-bottom:24px}

  /* Helpers */
  .hidden{display:none!important}
  .stat-label{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--primary-light)}
  .file-input{display:none}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-logo">⏻</div>
      <div class="brand-text">Power Telecom<small>RELATÓRIO CGR</small></div>
    </div>
    <div class="toc-title">Páginas</div>
    <ul class="toc" id="toc"></ul>
  </aside>

  <main>
    <header class="toolbar">
      <button class="menu-toggle" id="menuToggle" aria-label="Menu">☰</button>
      <button class="btn" id="editBtn">✏️ <span>Modo edição</span></button>
      <button class="btn" id="importBtn" title="Importar dados de um JSON salvo">📂 Importar</button>
      <input type="file" id="importFile" class="file-input" accept="application/json,.json">
      <button class="btn" id="exportBtn" title="Salvar uma cópia dos dados">💾 Exportar</button>
      <button class="btn" id="printBtn" title="Imprimir ou salvar PDF">🖨️ Imprimir</button>
      <div class="toolbar-spacer"></div>
      <button class="btn danger" id="resetBtn" title="Restaurar dados originais">↺ Restaurar</button>
    </header>

    <div class="stage" id="stage"></div>

    <nav class="slide-nav">
      <button class="btn" id="prevBtn">← Anterior</button>
      <div class="page-indicator"><strong id="curIdx">1</strong> / <span id="totalIdx">16</span></div>
      <button class="btn" id="nextBtn">Próxima →</button>
    </nav>
  </main>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalTitle">Editar dados</h3>
      <button class="close-btn" id="modalClose" aria-label="Fechar">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot">
      <button class="btn" id="modalCancel">Cancelar</button>
      <button class="btn primary" id="modalSave">Aplicar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   DADOS PADRÃO DO RELATÓRIO
   ============================================================ */
const DEFAULTS = {
  reportTitle: "RELATÓRIO DE\nAÇÕES CGR",
  slides: [
    /* 1 */ { id:1, type:"cover", title:"RELATÓRIO DE", titleAccent:"AÇÕES CGR" },
    /* 2 */ { id:2, type:"section", title:"ATIVIDADES", titleAccent:"SOC/CGR" },
    /* 3 */ { id:3, type:"line", title:"SEGURANÇA", subtitle:"Ataques DDOS",
              labels:["Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro","Janeiro","Fevereiro","Março","Abril","Maio"],
              series:[{name:"Variação",color:"#22C55E",data:[469,61,51,110,14972,4917,181,291,218,236,272,259,442]}] },
    /* 4 */ { id:4, type:"line", title:"SEGURANÇA", subtitle:"Ataques DDOS", sub2:"Mitigação Externa",
              labels:["Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro","Janeiro","Fevereiro","Março","Abril","Maio"],
              series:[{name:"Variação",color:"#22C55E",data:[3,4,3,16,35,44,33,38,41,32,27,37,51]}] },
    /* 5 */ { id:5, type:"pies", title:"SEGURANÇA", subtitle:"WANGUARD",
              charts:[
                {title:"Decoders", segments:[
                  {label:"INVALID",value:65,color:"#1a1a1a"},
                  {label:"ICMP",value:14,color:"#22c55e"},
                  {label:"TCP+SYNACK",value:9,color:"#7c2d12"},
                  {label:"TCP",value:7,color:"#3b82f6"},
                  {label:"Others",value:5,color:"#9ca3af"}
                ]},
                {title:"Sensor Interfaces", segments:[
                  {label:"FSA-BGP [LINK C16-AS53087-TELY]",value:37,color:"#c026d3"},
                  {label:"FSA-BGP [TV-STARTLINK-AS269719]",value:26,color:"#16a34a"},
                  {label:"FSA-BGP [PTTSP-PIX-BR.DIGITAL-IP]",value:20,color:"#94a3b8"},
                  {label:"FSA-BGP [PTTCE-PIX-BR.DIGITAL-IP]",value:14,color:"#22d3ee"},

/* ============================================================
   ESTADO E PERSISTÊNCIA
   ============================================================ */
const STORAGE_KEY = "cgr-report-v1";
let state = loadState();
let currentSlide = 1;
let editMode = false;
let charts = {};       // id -> Chart instance
let modalCtx = null;   // current edit modal context

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const loaded = JSON.parse(raw);
      // Migration: add any default slides missing in the loaded state (by id) so updates ship new pages
      if(loaded.slides && Array.isArray(loaded.slides)){
        const existingIds = new Set(loaded.slides.map(s => s.id));
        DEFAULTS.slides.forEach(def => {
          if(!existingIds.has(def.id)){
            loaded.slides.push(JSON.parse(JSON.stringify(def)));
          }
        });
        // keep slides ordered by id so the report flow stays predictable
        loaded.slides.sort((a,b) => a.id - b.id);
      }
      return loaded;
    }
  }catch(e){console.warn(e)}
  return JSON.parse(JSON.stringify(DEFAULTS));
}
function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){console.warn(e)}
}
function resetState(){
  if(!confirm("Tem certeza? Todas as edições serão perdidas e os dados originais do relatório serão restaurados.")) return;
  localStorage.removeItem(STORAGE_KEY);
  state = JSON.parse(JSON.stringify(DEFAULTS));
  render();
  toast("Dados originais restaurados.");
}

/* ============================================================
   TOC (sidebar)
   ============================================================ */
function buildTOC(){
  const toc = document.getElementById("toc");
  toc.innerHTML = "";
  state.slides.forEach((s,i) => {
    const li = document.createElement("li");
    const btn = document.createElement("button");
    btn.dataset.id = s.id;
    btn.innerHTML = `<span class="toc-num">${String(i+1).padStart(2,"0")}</span><span class="toc-label">${escapeHTML(slideShortLabel(s))}</span>`;
    btn.addEventListener("click", () => { currentSlide = s.id; render(); document.getElementById("sidebar").classList.remove("open"); });
    li.appendChild(btn);
    toc.appendChild(li);
  });
}
function slideShortLabel(s){
  if(s.type === "cover") return "Capa";
  if(s.type === "section") return `${s.title} ${s.titleAccent||""}`.trim();
  if(s.subtitle) return `${s.title} — ${s.subtitle}`;
  return s.title;
}

/* ============================================================
   RENDER PRINCIPAL
   ============================================================ */
function render(){
  // destroy any prior chart instances
  Object.values(charts).forEach(c => { try{ c.destroy(); }catch(e){} });
  charts = {};

  document.querySelectorAll(".toc button").forEach(b => b.classList.toggle("active", Number(b.dataset.id) === currentSlide));
  const slide = state.slides.find(s => s.id === currentSlide);
  const stage = document.getElementById("stage");
  stage.innerHTML = "";
  if(!slide){ stage.innerHTML = "<p>Slide não encontrado</p>"; return; }
  stage.appendChild(renderSlide(slide));

  document.getElementById("curIdx").textContent = state.slides.findIndex(s => s.id===currentSlide)+1;
  document.getElementById("totalIdx").textContent = state.slides.length;

  // wire editable text after render
  wireEditableTexts();
  saveState();
}

function renderSlide(s){
  const node = document.createElement("div");
  node.className = "slide " + s.type;
  switch(s.type){
    case "cover": node.appendChild(renderCover(s)); break;
    case "section": node.appendChild(renderSection(s)); break;
    case "line": renderChartSlide(node, s, "line"); break;
    case "bar": renderChartSlide(node, s, "bar"); break;
    case "hbar": renderChartSlide(node, s, "hbar"); break;
    case "dual-bar": renderChartSlide(node, s, "dual-bar"); break;
    case "time-bar": renderChartSlide(node, s, "time-bar"); break;
    case "pies": renderPies(node, s); break;
    case "activities": renderActivities(node, s); break;
    case "metrics": renderMetrics(node, s); break;
    case "vehicles": renderVehicles(node, s); break;
  }
  return node;
}

}

/* ---------- Chart slide (line / bar / hbar / dual-bar / time-bar) ---------- */
function renderChartSlide(node, s, mode){
  const idx = slideIdx(s.id);
  const head = document.createElement("div");
  head.className = "slide-head";
  head.innerHTML = `
    <div class="title-block">
      <h2 data-edit data-path="slides.${idx}.title">${escapeHTML(s.title)}</h2>
      ${s.subtitle !== undefined ? `<div class="subtitle" data-edit data-path="slides.${idx}.subtitle">${escapeHTML(s.subtitle)}</div>` : ""}
      ${s.sub2 !== undefined ? `<div class="sub2" data-edit data-path="slides.${idx}.sub2">${escapeHTML(s.sub2)}</div>` : ""}
    </div>
  `;
  node.appendChild(head);

  const chartWrap = document.createElement("div");
  chartWrap.className = "chart-wrap";
  const editBtn = document.createElement("button");
  editBtn.className = "edit-data-btn";
  editBtn.innerHTML = "📊 Editar dados";
  editBtn.addEventListener("click", () => openDataModal(s));
  chartWrap.appendChild(editBtn);

  const canvas = document.createElement("canvas");
  canvas.id = `chart-${s.id}`;
  chartWrap.appendChild(canvas);
  node.appendChild(chartWrap);

  // build chart after canvas in DOM
  setTimeout(() => buildChart(canvas, s, mode), 30);
}

function buildChart(canvas, s, mode){
  const ctx = canvas.getContext("2d");
  Chart.defaults.color = "#9CA3AF";
  Chart.defaults.font.family = "'Inter',sans-serif";
  Chart.defaults.borderColor = "rgba(255,255,255,.08)";

  let config;
  if(mode === "line"){
    const showLabels = s.series.length === 1; // skip labels when many series clutter the chart
    config = {
      type:"line",
      data:{
        labels:s.labels,
        datasets:s.series.map(ser => ({
          label:ser.name,
          data:ser.data,
          borderColor:ser.color,
          backgroundColor:ser.color,
          pointBackgroundColor:ser.color,
          pointRadius:4,
          borderWidth:3,
          tension:.25
        }))
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        layout:{ padding:{ top: 28, right: 14, bottom: 4 } },
        interaction: s.series.length > 1 ? { mode:"index", intersect:false, axis:"x" } : { mode:"nearest", intersect:true },
        plugins:{
          legend:{ display:true, position:"top", labels:{usePointStyle:true,pointStyle:"circle",padding:14,font:{size:12,weight:"600"}}},
          datalabels:false,
          tooltip:{
            mode: s.series.length > 1 ? "index" : "nearest",
            intersect: s.series.length > 1 ? false : true,
            backgroundColor:"#0a0e14",borderColor:"#22C55E",borderWidth:1,
            padding:12, titleFont:{size:13,weight:"700"}, bodyFont:{size:12,weight:"500"}, bodySpacing:4,
            callbacks:{label:(c)=>` ${c.dataset.label}: ${new Intl.NumberFormat("pt-BR").format(c.parsed.y)}`}
          }
        },
        scales:{
          x:{ ticks:{color:"#9CA3AF",font:{size:12}}, grid:{color:"rgba(255,255,255,.05)"} },
          y:{ ticks:{color:"#9CA3AF",callback:v=>new Intl.NumberFormat("pt-BR").format(v)}, grid:{color:"rgba(255,255,255,.05)"} }
        }
      },
      plugins: showLabels ? [ valueLabelPlugin() ] : []
    };
  } else if(mode === "bar"){
    config = {
      type:"bar",
      data:{
        labels:s.labels,
        datasets:[{
          label:"Quantidade",
          data:s.values,
          backgroundColor:s.colors || s.labels.map((_,i)=>i%2?"#86EFAC":"#22C55E"),
          borderRadius:14,
          borderSkipped:false
        }]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        layout:{ padding:{ top: 28 } },
        plugins:{ legend:{display:false}, tooltip:{backgroundColor:"#0a0e14",borderColor:"#22C55E",borderWidth:1} },
        scales:{
          x:{ ticks:{color:"#9CA3AF",font:{size:12,weight:"600"}}, grid:{display:false} },
          y:{ beginAtZero:true, ticks:{color:"#9CA3AF",callback:v=>new Intl.NumberFormat("pt-BR").format(v)}, grid:{color:"rgba(255,255,255,.05)"} }
        }
      },
      plugins:[ valueLabelPlugin("top") ]
    };
  } else if(mode === "hbar"){
    config = {
      type:"bar",
      data:{
        labels:s.labels,
        datasets:[{
          data:s.values,
          backgroundColor:s.labels.map((_,i)=>i%2?"#86EFAC":"#22C55E"),
          borderRadius:8,
          borderSkipped:false
        }]
      },
      options:{
        indexAxis:"y", responsive:true, maintainAspectRatio:false,
        layout:{ padding:{ right: 60 } },
        plugins:{ legend:{display:false}, tooltip:{backgroundColor:"#0a0e14",borderColor:"#22C55E",borderWidth:1} },
        scales:{
          x:{ beginAtZero:true, ticks:{color:"#9CA3AF",callback:v=>new Intl.NumberFormat("pt-BR").format(v)}, grid:{color:"rgba(255,255,255,.05)"} },
          y:{ ticks:{color:"#E5E7EB",font:{size:12,weight:"500"}}, grid:{display:false} }
        }
      },
      plugins:[ valueLabelPlugin("end") ]
    };
  } else if(mode === "dual-bar"){
    config = {
      type:"bar",
      data:{
        labels:s.items.map(i=>i.name),

        }

/* Custom value-label plugin so values appear on top of points / bars */
function valueLabelPlugin(position="top", formatter=null){
  return {
    id:"valueLabel",
    afterDatasetsDraw(chart){
      const {ctx} = chart;
      const chartArea = chart.chartArea;
      chart.data.datasets.forEach((ds, dsi) => {
        const meta = chart.getDatasetMeta(dsi);
        // Collect rendered label boxes to detect collisions in this dataset
        const placed = [];
        meta.data.forEach((el, i) => {
          const v = ds.data[i];
          if(v === null || v === undefined) return;
          const text = formatter ? formatter({dataIndex:i,parsed:{y:v}}) : new Intl.NumberFormat("pt-BR").format(v);
          ctx.save();

          // High-contrast defaults: bright white text on solid dark pill with green border
          let font = "800 12px Inter, sans-serif";
          let fillStyle = "#FFFFFF";
          let textAlign = "center";
          let textBaseline = "bottom";
          let x = el.x, y = el.y;
          let padX = 7, padY = 4, pill = true;
          let pillBg = "#0B1018";          // solid, no transparency — pops over chart
          let pillBorder = "#22C55E";       // bright green border
          let pillBorderWidth = 1.5;

          if(position === "top"){
            y = el.y - 10;
          } else if(position === "end"){
            // Outside-end label (light hbar tail): white text on solid dark pill, clear over any chart bg
            x = el.x + 10; y = el.y;
            textAlign = "left"; textBaseline = "middle";
            fillStyle = "#FFFFFF";
            pillBg = "#0B1018";
            pillBorder = "#22C55E";
          } else if(position === "inside-top"){
            // Big numbers inside thick green bars — dark text, no pill, with subtle white outline for legibility
            y = el.y + 30;
            fillStyle = "#0A0E14";
            font = "900 26px Inter, sans-serif";
            pill = false;
          }

          ctx.font = font;
          const tw = ctx.measureText(text).width;
          const th = parseInt(font.match(/(\d+)px/)[1], 10);

          // For hbar: if label would extend beyond chart area, move INSIDE the bar
          if(position === "end" && el.x + tw + 18 > chartArea.right){
            x = el.x - 10; textAlign = "right";
            fillStyle = "#0A0E14"; // dark text reads well on bright green bar
            pill = false;
          }

          // Line chart top labels: vertical anti-overlap with previous labels in same series
          if(position === "top"){
            let box = { x1: x - tw/2 - padX, x2: x + tw/2 + padX, y1: y - th - padY, y2: y + padY };
            let collides = placed.some(p => !(box.x2 < p.x1 || box.x1 > p.x2 || box.y2 < p.y1 || box.y1 > p.y2));
            if(collides){
              y = el.y + th + 12;
              textBaseline = "bottom";
              box = { x1: x - tw/2 - padX, x2: x + tw/2 + padX, y1: y - th - padY, y2: y + padY };
            }
            // Clamp so pill stays inside chart vertically
            if(y - th - padY < chartArea.top){ y = chartArea.top + th + padY; }
            if(y + padY > chartArea.bottom){ y = chartArea.bottom - padY; }
            placed.push({ x1: x - tw/2 - padX, x2: x + tw/2 + padX, y1: y - th - padY, y2: y + padY });
          }

          // Draw pill background
          if(pill){
            const bx = textAlign === "center" ? x - tw/2 - padX : (textAlign === "left" ? x - padX : x - tw - padX);
            const by = textBaseline === "bottom" ? y - th - padY : y - th/2 - padY;
            const bw = tw + padX*2;
            const bh = th + padY*2;
            // subtle shadow for lift
            ctx.shadowColor = "rgba(0,0,0,.4)";
            ctx.shadowBlur = 6;
            ctx.shadowOffsetY = 1;
            ctx.fillStyle = pillBg;
            roundRect(ctx, bx, by, bw, bh, 5);
            ctx.fill();
            ctx.shadowColor = "transparent";
            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;
            ctx.strokeStyle = pillBorder;
            ctx.lineWidth = pillBorderWidth;
            roundRect(ctx, bx, by, bw, bh, 5);
            ctx.stroke();
          } else {
            // No pill — add a soft outline / shadow so dark numbers on bright bars stay crisp
            ctx.shadowColor = "rgba(255,255,255,.45)";
            ctx.shadowBlur = 4;
          }

          ctx.fillStyle = fillStyle;
          ctx.textAlign = textAlign;
          ctx.textBaseline = textBaseline;
          ctx.fillText(text, x, y);
          ctx.restore();
        });
      });
    }
  };
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

/* Pie percentage labels — white bold text with shadow so it pops on any slice color */
function piePercentPlugin(){
  return {
    id:"piePercent",
    afterDatasetsDraw(chart){
      const ctx = chart.ctx;
      chart.data.datasets.forEach((ds, dsi) => {
        const meta = chart.getDatasetMeta(dsi);
        const total = ds.data.reduce((a,b)=>a+(Number(b)||0),0);
        if(!total) return;
        meta.data.forEach((el, i) => {
          const v = Number(ds.data[i]) || 0;
          if(!v) return;
          const pct = Math.round((v/total)*100);
          if(pct < 4) return; // skip slices too small to fit text
          const pos = el.tooltipPosition();
          ctx.save();
          ctx.font = "800 11px Inter, sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          // strong shadow so it reads on light AND dark slices
          ctx.shadowColor = "rgba(0,0,0,.85)";
          ctx.shadowBlur = 4;
          ctx.fillStyle = "#FFFFFF";
          ctx.fillText(pct + "%", pos.x, pos.y);
          ctx.restore();
        });
      });
    }
  };
}

function formatNumber(n){
  if(n === null || n === undefined || n === "") return "0";
  return new Intl.NumberFormat("pt-BR").format(Number(n));
}
function formatMoney(n){
  if(n === null || n === undefined || n === "") return "0,00";
  return new Intl.NumberFormat("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2}).format(Number(n));
}
function parseLocaleNumber(s){
  if(typeof s !== "string") return Number(s)||0;
  // Strip everything that isn't a digit, comma, dot or minus
  const cleaned = s.replace(/[^\d,.-]/g,"").replace(/\./g,"").replace(",",".");
  const n = parseFloat(cleaned);
  return isNaN(n) ? 0 : n;
}

/* ============================================================
   EDIÇÃO DE TEXTO INLINE
   ============================================================ */
function wireEditableTexts(){
  document.querySelectorAll("[data-edit][data-path]").forEach(el => {
    el.setAttribute("contenteditable", editMode ? "true" : "false");
    el.addEventListener("blur", onTextBlur);
    el.addEventListener("focus", (e) => {
      // Select all on focus for easier editing of numbers and short labels
      if(!editMode) return;
      const range = document.createRange();
      range.selectNodeContents(e.target);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    });
    el.addEventListener("keydown", (e) => {
      if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        el.blur();
      }
    });
  });
}
function onTextBlur(e){
  const path = e.target.dataset.path;
  if(!path) return;
  const type = e.target.dataset.type;
  let value = e.target.innerText.trim();
  if(type === "number"){
    value = parseLocaleNumber(value);
    const money = e.target.dataset.money === "1";
    e.target.innerText = money ? formatMoney(value) : formatNumber(value);
  }
  setPath(state, path, value);
  saveState();
  // rebuild TOC labels if title changed
  buildTOC();
  document.querySelectorAll(".toc button").forEach(b => b.classList.toggle("active", Number(b.dataset.id) === currentSlide));
}
function setPath(obj, path, value){
  const parts = path.split(".");
  let cur = obj;
  for(let i=0;i<parts.length-1;i++){
    const k = isNaN(parts[i]) ? parts[i] : Number(parts[i]);
    cur = cur[k];
  }
  const last = parts[parts.length-1];
  cur[isNaN(last) ? last : Number(last)] = value;
}

/* ============================================================
   MODAL DE EDIÇÃO DE DADOS
   ============================================================ */
function openDataModal(s){
  modalCtx = { slide: JSON.parse(JSON.stringify(s)), id:s.id };
  const body = document.getElementById("modalBody");
  document.getElementById("modalTitle").textContent = `Editar dados — ${s.title}${s.subtitle?" · "+s.subtitle:""}`;
  body.innerHTML = "";
  if(s.type === "line"){ body.appendChild(buildLineEditor(modalCtx.slide)); }
  else if(s.type === "bar"){ body.appendChild(buildBarEditor(modalCtx.slide, false)); }
  else if(s.type === "hbar"){ body.appendChild(buildBarEditor(modalCtx.slide, true)); }
  else if(s.type === "dual-bar"){ body.appendChild(buildDualBarEditor(modalCtx.slide, false)); }
  else if(s.type === "time-bar"){ body.appendChild(buildDualBarEditor(modalCtx.slide, true)); }
  else if(s.type === "pies"){ body.appendChild(buildPiesEditor(modalCtx.slide)); }
  else if(s.type === "metrics"){ body.appendChild(buildMetricsEditor(modalCtx.slide)); }
  else if(s.type === "vehicles"){ body.appendChild(buildVehiclesEditor(modalCtx.slide)); }
  document.getElementById("modalBackdrop").classList.add("open");
}
function closeModal(){ document.getElementById("modalBackdrop").classList.remove("open"); modalCtx = null; }
function applyModal(){
  if(!modalCtx) return;
  const idx = slideIdx(modalCtx.id);
  state.slides[idx] = modalCtx.slide;
  saveState();
  buildTOC();
  document.querySelectorAll(".toc button").forEach(b => b.classList.toggle("active", Number(b.dataset.id) === currentSlide));
  render();
  closeModal();
  toast("Dados atualizados.");
}

/* --- Line chart editor: editable label row + one row per series x labels --- */
function buildLineEditor(slide){
  const root = document.createElement("div");
  // Labels editor
  const labelsBlock = document.createElement("div");
  labelsBlock.className = "series-block";
  labelsBlock.innerHTML = `<div class="series-head"><strong>Rótulos do eixo (ex: meses)</strong></div>`;
  const labelsTable = document.createElement("table");
  labelsTable.className = "data-table";
  labelsTable.innerHTML = `<thead><tr><th>#</th><th>Rótulo</th><th class="col-actions"></th></tr></thead><tbody></tbody>`;
  const labelsBody = labelsTable.querySelector("tbody");
  function rerenderLabels(){
    labelsBody.innerHTML = "";
    slide.labels.forEach((lab, i) => {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td>${i+1}</td><td><input type="text" value="${escapeAttr(lab)}"></td><td class="col-actions"><button class="icon-btn" title="Remover">🗑</button></td>`;
      tr.querySelector("input").addEventListener("input", (e)=>{ slide.labels[i] = e.target.value; });
      tr.querySelector(".icon-btn").addEventListener("click", () => {
        slide.labels.splice(i,1);
        slide.series.forEach(ser => ser.data.splice(i,1));
        rerenderAll();
      });
      labelsBody.appendChild(tr);
    });
  }
  labelsBlock.appendChild(labelsTable);
  const addLabel = document.createElement("button");
  addLabel.className = "add-row-btn";
  addLabel.textContent = "＋ Adicionar rótulo";
  addLabel.addEventListener("click", () => {
    slide.labels.push("Novo");
    slide.series.forEach(ser => ser.data.push(0));
    rerenderAll();
  });
  labelsBlock.appendChild(addLabel);
  root.appendChild(labelsBlock);

  // Series
  const seriesWrap = document.createElement("div");
  root.appendChild(seriesWrap);

  function rerenderSeries(){
    seriesWrap.innerHTML = "";
    slide.series.forEach((ser, si) => {
      const block = document.createElement("div");
      block.className = "series-block";
      block.innerHTML = `<div class="series-head">
        <strong>Série ${si+1}</strong>
        <input type="text" value="${escapeAttr(ser.name)}" placeholder="Nome da série" data-role="name">
        <input type="color" value="${ser.color}" data-role="color">
        <button class="icon-btn" data-role="del" title="Remover série">🗑 Remover série</button>
      </div>`;
      block.querySelector('[data-role=name]').addEventListener("input", e => ser.name = e.target.value);
      block.querySelector('[data-role=color]').addEventListener("input", e => ser.color = e.target.value);
      block.querySelector('[data-role=del]').addEventListener("click", () => {
        if(slide.series.length === 1){ alert("É preciso pelo menos uma série."); return; }
        slide.series.splice(si,1);
        rerenderSeries();
      });
      const t = document.createElement("table");
      t.className = "data-table";
      t.innerHTML = `<thead><tr><th>Rótulo</th><th>Valor</th></tr></thead><tbody></tbody>`;
      const tb = t.querySelector("tbody");
      slide.labels.forEach((lab, i) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${escapeHTML(lab)}</td><td><input type="number" step="any" value="${ser.data[i] ?? 0}"></td>`;
        tr.querySelector("input").addEventListener("input", e => ser.data[i] = Number(e.target.value));
        tb.appendChild(tr);
      });
      block.appendChild(t);
      seriesWrap.appendChild(block);
    });
  }
  const addSeries = document.createElement("button");
  addSeries.className = "add-row-btn";
  addSeries.textContent = "＋ Adicionar série";
  addSeries.addEventListener("click", () => {
    slide.series.push({name:"Nova série",color:"#3B82F6",data:slide.labels.map(()=>0)});
    rerenderSeries();
  });
  root.appendChild(addSeries);

  function rerenderAll(){ rerenderLabels(); rerenderSeries(); }
  rerenderAll();
  return root;
}

    slide.items.forEach((it,i) => {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td><input type="text" value="${escapeAttr(it.label)}"></td><td><input type="number" step="any" value="${it.value ?? 0}"></td><td><input type="text" value="${escapeAttr(it.prefix||"")}" placeholder="ex: R$ "></td><td><input type="text" value="${escapeAttr(it.suffix||"")}" placeholder="ex: refeições"></td><td style="text-align:center"><input type="checkbox" ${it.money?"checked":""}></td><td><input type="color" value="${it.color || "#22C55E"}"></td><td class="col-actions"><button class="icon-btn">🗑</button></td>`;
      const inputs = tr.querySelectorAll("input");
      inputs[0].addEventListener("input", e => it.label = e.target.value);
      inputs[1].addEventListener("input", e => it.value = Number(e.target.value));
      inputs[2].addEventListener("input", e => it.prefix = e.target.value);
      inputs[3].addEventListener("input", e => it.suffix = e.target.value);
      inputs[4].addEventListener("change", e => it.money = e.target.checked);
      inputs[5].addEventListener("input", e => it.color = e.target.value);
      tr.querySelector(".icon-btn").addEventListener("click", () => { slide.items.splice(i,1); rerender(); });
      tbody.appendChild(tr);
    });
  }
  block.appendChild(table);
  const addRow = document.createElement("button");
  addRow.className = "add-row-btn";
  addRow.textContent = "＋ Adicionar campo";
  addRow.addEventListener("click", () => { slide.items.push({label:"Novo campo",value:0,color:"#22C55E"}); rerender(); });
  block.appendChild(addRow);
  root.appendChild(block);
  rerender();
  return root;
}

/* --- Vehicles editor (Combustível) --- */
function buildVehiclesEditor(slide){
  const root = document.createElement("div");
  const block = document.createElement("div");
  block.className = "series-block";
  block.innerHTML = `<div class="series-head"><strong>Veículos</strong><span style="font-size:12px;color:var(--text-muted)">Você pode editar valores direto no slide. Use este editor para adicionar/remover veículos.</span></div>`;
  const table = document.createElement("table");
  table.className = "data-table";
  table.innerHTML = `<thead><tr><th>Placa</th><th>Litros</th><th>Valor (R$)</th><th>Km</th><th>Cor</th><th class="col-actions"></th></tr></thead><tbody></tbody>`;
  const tbody = table.querySelector("tbody");
  function rerender(){
    tbody.innerHTML = "";
    slide.vehicles.forEach((v,i) => {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td><input type="text" value="${escapeAttr(v.placa)}" style="font-family:'JetBrains Mono',monospace;font-weight:700"></td><td><input type="number" step="any" value="${v.litros ?? 0}"></td><td><input type="number" step="0.01" value="${v.valor ?? 0}"></td><td><input type="number" step="any" value="${v.km ?? 0}"></td><td><input type="color" value="${v.color || "#22C55E"}"></td><td class="col-actions"><button class="icon-btn">🗑</button></td>`;
      const inputs = tr.querySelectorAll("input");
      inputs[0].addEventListener("input", e => v.placa = e.target.value);
      inputs[1].addEventListener("input", e => v.litros = Number(e.target.value));
      inputs[2].addEventListener("input", e => v.valor = Number(e.target.value));
      inputs[3].addEventListener("input", e => v.km = Number(e.target.value));
      inputs[4].addEventListener("input", e => v.color = e.target.value);
      tr.querySelector(".icon-btn").addEventListener("click", () => { slide.vehicles.splice(i,1); rerender(); });
      tbody.appendChild(tr);
    });
  }
  block.appendChild(table);
  const addRow = document.createElement("button");
  addRow.className = "add-row-btn";
  addRow.textContent = "＋ Adicionar veículo";
  addRow.addEventListener("click", () => {
    const colors = ["#22C55E","#86EFAC","#60A5FA","#F59E0B","#EF4444","#A855F7"];
    const c = colors[slide.vehicles.length % colors.length];
    slide.vehicles.push({placa:"ABC-0000",litros:0,valor:0,km:0,color:c});
    rerender();
  });
  block.appendChild(addRow);
  root.appendChild(block);
  rerender();
  return root;
}

/* --- Pies editor: list each pie chart and its segments --- */
function buildPiesEditor(slide){
  const root = document.createElement("div");
  function rerender(){
    root.innerHTML = "";
    slide.charts.forEach((c, ci) => {
      const block = document.createElement("div");
      block.className = "series-block";
      block.innerHTML = `<div class="series-head">
        <strong>Gráfico ${ci+1}</strong>
        <input type="text" value="${escapeAttr(c.title)}" data-role="title" placeholder="Título do gráfico">
        <button class="icon-btn" data-role="del" title="Remover gráfico">🗑 Remover gráfico</button>
      </div>`;
      block.querySelector('[data-role=title]').addEventListener("input", e => c.title = e.target.value);
      block.querySelector('[data-role=del]').addEventListener("click", () => {
        if(slide.charts.length===1){ alert("É preciso pelo menos um gráfico."); return; }
        slide.charts.splice(ci,1); rerender();
      });
      const t = document.createElement("table");
      t.className = "data-table";
      t.innerHTML = `<thead><tr><th>Rótulo</th><th>Valor (%)</th><th>Cor</th><th class="col-actions"></th></tr></thead><tbody></tbody>`;
      const tb = t.querySelector("tbody");
      c.segments.forEach((seg, si) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td><input type="text" value="${escapeAttr(seg.label)}"></td><td><input type="number" step="any" value="${seg.value}"></td><td><input type="color" value="${seg.color}"></td><td class="col-actions"><button class="icon-btn">🗑</button></td>`;
        const [lab,val,col] = tr.querySelectorAll("input");
        lab.addEventListener("input", e => seg.label = e.target.value);
        val.addEventListener("input", e => seg.value = Number(e.target.value));
        col.addEventListener("input", e => seg.color = e.target.value);
        tr.querySelector(".icon-btn").addEventListener("click", () => { c.segments.splice(si,1); rerender(); });
        tb.appendChild(tr);
      });
      block.appendChild(t);
      const addSeg = document.createElement("button");
      addSeg.className = "add-row-btn";
      addSeg.textContent = "＋ Adicionar segmento";
      addSeg.addEventListener("click", () => { c.segments.push({label:"Novo",value:0,color:"#9CA3AF"}); rerender(); });
      block.appendChild(addSeg);
      root.appendChild(block);
    });
    const addChart = document.createElement("button");
    addChart.className = "add-row-btn";
    addChart.textContent = "＋ Adicionar novo gráfico de pizza";
    addChart.addEventListener("click", () => {
      slide.charts.push({title:"Novo gráfico", segments:[{label:"Segmento",value:100,color:"#22C55E"}]});
      rerender();
    });
    root.appendChild(addChart);
  }
  rerender();
  return root;
}

/* ============================================================
   IMPORT / EXPORT JSON
   ============================================================ */
function exportJSON(){
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const stamp = new Date().toISOString().slice(0,10);
  a.href = url; a.download = `relatorio-cgr-${stamp}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast("Arquivo JSON baixado.");
}
function importJSON(file){
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const data = JSON.parse(e.target.result);
      if(!data.slides || !Array.isArray(data.slides)) throw new Error("formato inválido");
      state = data;
      saveState();
      buildTOC();
      currentSlide = state.slides[0].id;
      render();
      toast("Dados importados com sucesso.");
    }catch(err){
      alert("Não foi possível ler o arquivo: " + err.message);
    }
  };
  reader.readAsText(file);
}

/* ============================================================
   UTILITÁRIOS
   ============================================================ */
function slideIdx(id){ return state.slides.findIndex(s=>s.id===id); }
function escapeHTML(s){ if(s===undefined||s===null) return ""; return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }
function escapeAttr(s){ return escapeHTML(s); }
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>t.classList.remove("show"), 2200);
}

/* ============================================================
   BOOT
   ============================================================ */
function setEditMode(on){
  editMode = on;
  document.body.classList.toggle("edit-mode", on);
  const btn = document.getElementById("editBtn");
  btn.classList.toggle("active", on);
  btn.innerHTML = on ? "✓ Salvar e sair" : "✏️ <span>Modo edição</span>";
  document.querySelectorAll("[data-edit]").forEach(el => el.setAttribute("contenteditable", on ? "true" : "false"));
  if(on) toast("Modo edição ativado. Clique em textos para editar ou use 'Editar dados' nos gráficos.");
}

document.getElementById("editBtn").addEventListener("click", () => setEditMode(!editMode));
document.getElementById("exportBtn").addEventListener("click", exportJSON);
document.getElementById("importBtn").addEventListener("click", () => document.getElementById("importFile").click());
document.getElementById("importFile").addEventListener("change", e => { if(e.target.files[0]) importJSON(e.target.files[0]); e.target.value=""; });
document.getElementById("printBtn").addEventListener("click", () => {
  // Render all slides for print
  Object.values(charts).forEach(c => { try{ c.destroy(); }catch(e){} });
  charts = {};
  const stage = document.getElementById("stage");
  stage.innerHTML = "";
  stage.classList.add("slides-all");
  state.slides.forEach(s => stage.appendChild(renderSlide(s)));
  document.body.classList.add("print-view");
  // Give charts time to build then print
  setTimeout(() => {
    window.print();
    setTimeout(() => {
      document.body.classList.remove("print-view");
      stage.classList.remove("slides-all");
      Object.values(charts).forEach(c => { try{ c.destroy(); }catch(e){} });
      charts = {};
      render();
    }, 500);
  }, 700);
});
document.getElementById("resetBtn").addEventListener("click", resetState);
document.getElementById("prevBtn").addEventListener("click", () => {
  const i = slideIdx(currentSlide);
  if(i > 0){ currentSlide = state.slides[i-1].id; render(); }
});
document.getElementById("nextBtn").addEventListener("click", () => {
  const i = slideIdx(currentSlide);
  if(i < state.slides.length-1){ currentSlide = state.slides[i+1].id; render(); }
});
document.getElementById("menuToggle").addEventListener("click", () => document.getElementById("sidebar").classList.toggle("open"));

document.getElementById("modalClose").addEventListener("click", closeModal);
document.getElementById("modalCancel").addEventListener("click", closeModal);
document.getElementById("modalSave").addEventListener("click", applyModal);
document.getElementById("modalBackdrop").addEventListener("click", e => { if(e.target.id === "modalBackdrop") closeModal(); });

document.addEventListener("keydown", e => {
  if(document.activeElement && (document.activeElement.tagName==="INPUT"||document.activeElement.tagName==="TEXTAREA"||document.activeElement.isContentEditable)) return;
  if(e.key === "ArrowRight"){ document.getElementById("nextBtn").click(); }
  if(e.key === "ArrowLeft"){ document.getElementById("prevBtn").click(); }
  if(e.key === "Escape" && document.getElementById("modalBackdrop").classList.contains("open")) closeModal();
});

window.addEventListener("resize", () => Object.values(charts).forEach(c => c.resize()));

buildTOC();
render();
</script>
</body>
</html>
